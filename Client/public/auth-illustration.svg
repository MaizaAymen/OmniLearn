<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background elements -->
  <circle cx="250" cy="200" r="160" fill="rgba(99,102,241,0.08)" />
  <circle cx="250" cy="200" r="120" fill="rgba(59,130,246,0.06)" />

  <!-- Laptop body -->
  <rect x="120" y="100" width="260" height="170" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Screen -->
  <rect x="132" y="112" width="236" height="146" rx="4" fill="#0f172a"/>
  <!-- Screen content - code lines -->
  <rect x="148" y="130" width="80" height="6" rx="3" fill="#818cf8" opacity="0.8"/>
  <rect x="148" y="144" width="120" height="6" rx="3" fill="#38bdf8" opacity="0.6"/>
  <rect x="165" y="158" width="100" height="6" rx="3" fill="#34d399" opacity="0.7"/>
  <rect x="165" y="172" width="60" height="6" rx="3" fill="#f472b6" opacity="0.5"/>
  <rect x="148" y="186" width="90" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
  <rect x="148" y="200" width="140" height="6" rx="3" fill="#38bdf8" opacity="0.5"/>
  <rect x="165" y="214" width="75" height="6" rx="3" fill="#fbbf24" opacity="0.6"/>
  <rect x="148" y="228" width="50" height="6" rx="3" fill="#818cf8" opacity="0.7"/>
  <!-- Sidebar accent -->
  <rect x="300" y="130" width="56" height="108" rx="4" fill="rgba(99,102,241,0.15)"/>
  <circle cx="328" cy="148" r="14" fill="rgba(99,102,241,0.3)"/>
  <rect x="312" y="170" width="32" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="312" y="180" width="24" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="312" y="194" width="32" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="312" y="204" width="20" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="312" y="218" width="28" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Laptop base -->
  <path d="M100 270 L120 270 L130 290 L370 290 L380 270 L400 270 L390 300 Q388 308 380 308 L120 308 Q112 308 110 300 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <ellipse cx="250" cy="279" rx="40" ry="3" fill="#334155"/>

  <!-- AI brain icon floating -->
  <g transform="translate(380, 80)">
    <circle cx="0" cy="0" r="28" fill="rgba(99,102,241,0.2)" stroke="#818cf8" stroke-width="1.5"/>
    <path d="M-10 -5 Q-10 -15 0 -15 Q10 -15 10 -5 Q15 -5 15 2 Q15 10 8 10 L-8 10 Q-15 10 -15 2 Q-15 -5 -10 -5Z" fill="#818cf8" opacity="0.8"/>
    <circle cx="-4" cy="0" r="2" fill="#e0e7ff"/>
    <circle cx="4" cy="0" r="2" fill="#e0e7ff"/>
    <path d="M-3 5 Q0 8 3 5" stroke="#e0e7ff" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Floating elements -->
  <g opacity="0.6">
    <rect x="80" y="140" width="24" height="24" rx="6" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
    <text x="92" y="157" text-anchor="middle" fill="#38bdf8" font-size="14">✓</text>
  </g>

  <g opacity="0.5">
    <rect x="400" y="190" width="24" height="24" rx="6" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1"/>
    <text x="412" y="207" text-anchor="middle" fill="#34d399" font-size="12">📊</text>
  </g>

  <!-- Connection dots -->
  <circle cx="108" cy="152" r="3" fill="#38bdf8" opacity="0.4"/>
  <circle cx="116" cy="148" r="2" fill="#38bdf8" opacity="0.3"/>
  <circle cx="396" cy="202" r="3" fill="#34d399" opacity="0.4"/>

  <!-- Graduation cap -->
  <g transform="translate(100, 70)" opacity="0.5">
    <polygon points="0,10 20,0 40,10 20,20" fill="#fbbf24" opacity="0.7"/>
    <line x1="20" y1="20" x2="20" y2="30" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  </g>
</svg>
